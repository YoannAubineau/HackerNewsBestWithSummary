# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Check LLM Versions

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv sync --frozen

      - name: Check for newer LLM versions
        id: check
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          set +e
          uv run app check-llm-versions > report.txt
          code=$?
          cat report.txt
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          # 0 = up to date, 2 = newer version available (handled below).
          # Anything else means the check itself failed and must surface as
          # a red run so the workflow-failure step fires.
          if [ "$code" != "0" ] && [ "$code" != "2" ]; then
            exit "$code"
          fi

      - name: Open issue when a newer model is available
        if: steps.check.outputs.exit_code == '2'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          title="LLM: newer model available on OpenRouter"
          existing="$(gh issue list --search "\"$title\" in:title is:open" --json number --jq '.[0].number')"
          if [ -n "$existing" ]; then
            echo "Issue #$existing already open; skipping."
            exit 0
          fi
          gh label create llm-model-update --force --color 0E8A16 --description "Newer LLM version detected on OpenRouter"
          gh issue create --title "$title" --label llm-model-update --body-file report.txt

      - name: Report workflow failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh label create check-llm-versions-failure --force --color B60205 --description "Weekly LLM version check workflow failed"
          timestamp="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          existing="$(gh issue list --label check-llm-versions-failure --state open --json number --jq '.[0].number')"
          body=$(cat <<EOF
          Weekly LLM version check failed at ${timestamp} (UTC).

          Run: ${RUN_URL}
          EOF
          )
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "Weekly LLM version check failed" --label check-llm-versions-failure --body "$body"
          fi
