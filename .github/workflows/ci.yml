# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: ci

on:
  push:
    branches: [main]
    paths-ignore:
      - "artifacts/**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv sync --frozen

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Type check
        run: uv run pyright src/

      - name: Tests
        run: uv run pytest
