# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Feed Refresh

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: cycle
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv sync --frozen

      - name: Run cycle
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          owner_lc="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          export FEED_SELF_URL="https://${owner_lc}.github.io/${{ github.event.repository.name }}/feed.fr.xml"
          uv run app cycle

      - name: Refresh OpenRouter usage chart
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        continue-on-error: true
        run: uv run app update-usage

      - name: Commit & push
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artefacts/ docs/
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "cycle: update feed"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - uses: actions/configure-pages@v6
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'

      - uses: actions/upload-pages-artifact@v5
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        with:
          path: artefacts

      - id: deploy
        uses: actions/deploy-pages@v5
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
