# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: cycle

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: cycle
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv sync --frozen

      - name: Run cycle
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          owner_lc="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          export FEED_SELF_URL="https://${owner_lc}.github.io/${{ github.event.repository.name }}/feed.fr.xml"
          uv run app cycle

      - name: Refresh OpenRouter usage badge
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        continue-on-error: true
        run: |
          mkdir -p docs
          if ! curl -sf -o /tmp/openrouter-key.json \
               -H "Authorization: Bearer $OPENROUTER_API_KEY" \
               https://openrouter.ai/api/v1/auth/key; then
            echo "OpenRouter auth/key fetch failed; keeping previous badge."
            exit 0
          fi
          python3 > docs/usage.json <<'PY'
          import json
          with open("/tmp/openrouter-key.json") as f:
              d = json.load(f)["data"]
          usage = d.get("usage") or 0
          limit = d.get("limit")
          if limit is not None and limit > 0:
              msg = f"${usage:.2f} / ${limit:.2f}"
              ratio = usage / limit
              color = "brightgreen" if ratio < 0.5 else "yellow" if ratio < 0.8 else "red"
          else:
              msg = f"${usage:.2f} spent"
              color = "blue"
          print(json.dumps({
              "schemaVersion": 1,
              "label": "OpenRouter",
              "message": msg,
              "color": color,
          }))
          PY
          cat docs/usage.json

      - name: Commit & push
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artefacts/ docs/
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "cycle: update feed"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - uses: actions/configure-pages@v6
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'

      - uses: actions/upload-pages-artifact@v5
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        with:
          path: artefacts

      - id: deploy
        uses: actions/deploy-pages@v5
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
