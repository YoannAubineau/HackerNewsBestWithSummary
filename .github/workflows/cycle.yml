# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Feed Refresh

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: cycle
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

jobs:
  run:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv sync --frozen

      - name: Run cycle
        id: cycle
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          WEBSHARE_PROXY_USERNAME: ${{ secrets.WEBSHARE_PROXY_USERNAME }}
          WEBSHARE_PROXY_PASSWORD: ${{ secrets.WEBSHARE_PROXY_PASSWORD }}
          FEEDLY_DEV_TOKEN: ${{ secrets.FEEDLY_DEV_TOKEN }}
        run: |
          owner_lc="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          export FEED_SELF_URL="https://${owner_lc}.github.io/${{ github.event.repository.name }}/feed.fr.xml"
          uv run app cycle

      - name: Report cycle failure
        if: failure() && steps.cycle.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh label create cycle-failure --force --color B60205 --description "Hourly cycle workflow failed"
          timestamp="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          existing="$(gh issue list --label cycle-failure --state open --json number --jq '.[0].number')"
          body=$(cat <<EOF
          Cycle run failed at ${timestamp} (UTC).

          Run: ${RUN_URL}
          EOF
          )
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "Hourly cycle failed" --label cycle-failure --body "$body"
          fi

      - name: Report article failures
        if: steps.cycle.outputs.failures_count != '' && steps.cycle.outputs.failures_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          FAILURES_JSON: ${{ steps.cycle.outputs.failures_json }}
        run: |
          gh label create failed-article --force --color D93F0B --description "One or more articles moved to _failed/"
          timestamp="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          existing="$(gh issue list --label failed-article --state open --json number --jq '.[0].number')"
          bullets="$(echo "$FAILURES_JSON" | jq -r '.[] | "- `\(.guid)`: \(.error)"')"
          body=$(cat <<EOF
          Article(s) moved to _failed/ during cycle at ${timestamp} (UTC).

          Run: ${RUN_URL}

          Failures:
          ${bullets}
          EOF
          )
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "Article(s) failed during cycle" --label failed-article --body "$body"
          fi

      - name: Refresh OpenRouter usage chart
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        continue-on-error: true
        run: uv run app update-usage

      - name: Commit & push
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/ docs/
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "cycle: update feed"
            # The remote may have advanced while the cycle was running
            # (e.g., a concurrent dev push). Rebase on top and retry.
            for attempt in 1 2 3; do
              if git pull --rebase --autostash origin main && git push; then
                echo "changed=true" >> $GITHUB_OUTPUT
                exit 0
              fi
              # Clear any half-done rebase state so the next attempt starts fresh.
              git rebase --abort 2>/dev/null || true
              echo "push attempt $attempt failed, retrying"
              sleep $((attempt * 5))
            done
            exit 1
          fi

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: artifacts

      - id: deploy
        uses: actions/deploy-pages@v5
